// ─── DB Functions ────────────────────────────────────────────────────────────
const hashPassword = async (pw) => {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
};

// รูปภาพเก็บเป็น base64 ใน Firestore (ไม่ใช้ Storage เพราะต้องจ่ายเงิน)
const compressImage = (base64, maxW=800) => new Promise(res => {
  const img = new Image();
  img.onload = () => {
    const ratio = Math.min(1, maxW / img.width);
    const canvas = document.createElement("canvas");
    canvas.width = img.width * ratio;
    canvas.height = img.height * ratio;
    canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
    res(canvas.toDataURL("image/jpeg", 0.6));
  };
  img.src = base64;
});

async function seedAdmin() {
  const ref_ = doc(db, "users", "admin");
  const snap = await getDoc(ref_);
  if (!snap.exists()) {
    await setDoc(ref_, {
      name: "สภานักเรียน", student_id: "admin",
      password: "dad74d88a336d64cfcc5532c00e5e60d4c10d1ef5ee43ac8d1532209e2ca1ba5",
      role: "admin", points: 0,
    });
  }
  const rSnap = await getDocs(collection(db, "rewards"));
  if (rSnap.empty) {
    for (const r of [
      { name:"ไอติมแท่ง", points_required:20, stock:10 },
      { name:"สมุดโน้ต",  points_required:50, stock:5  },
      { name:"ปากกา",     points_required:30, stock:8  },
    ]) await addDoc(collection(db, "rewards"), r);
  }
}

async function loginUser(student_id, password) {
  const hash = await hashPassword(password);
  const snap = await getDocs(query(collection(db,"users"), where("student_id","==",student_id)));
  if (snap.empty) throw new Error("รหัสนักเรียนหรือรหัสผ่านไม่ถูกต้อง");
  const d = snap.docs[0];
  if (d.data().password !== hash) throw new Error("รหัสนักเรียนหรือรหัสผ่านไม่ถูกต้อง");
  return { id: d.id, ...d.data() };
}

async function registerUser(name, student_id, password) {
  const hash = await hashPassword(password);
  const ex = await getDocs(query(collection(db,"users"), where("student_id","==",student_id)));
  if (!ex.empty) throw new Error("รหัสนักเรียนนี้ถูกใช้แล้ว");
  const ref_ = await addDoc(collection(db,"users"), { name, student_id, password:hash, role:"student", points:0 });
  return { id:ref_.id, name, student_id, role:"student", points:0 };
}

async function getUser(id) {
  const snap = await getDoc(doc(db,"users",id));
  return snap.exists() ? { id:snap.id, ...snap.data() } : null;
}

async function submitWork(userId, userName, description, base64Image) {
  const compressed = base64Image ? await compressImage(base64Image) : null;
  return await addDoc(collection(db,"submissions"), {
    user_id:userId, user_name:userName, description,
    image: compressed, status:"pending", points_awarded:0,
    created_at: serverTimestamp(),
  });
}

async function getSubmissionsByUser(userId) {
  const snap = await getDocs(query(collection(db,"submissions"), where("user_id","==",userId), orderBy("created_at","desc")));
  return snap.docs.map(d => ({ id:d.id, ...d.data(), created_at:d.data().created_at?.toMillis?.()??Date.now() }));
}

async function getAllSubmissions() {
  const snap = await getDocs(query(collection(db,"submissions"), orderBy("created_at","desc")));
  return snap.docs.map(d => ({ id:d.id, ...d.data(), created_at:d.data().created_at?.toMillis?.()??Date.now() }));
}

async function approveSubmission(subId, userId, points) {
  await runTransaction(db, async tx => {
    const uRef = doc(db,"users",userId);
    const uSnap = await tx.get(uRef);
    tx.update(doc(db,"submissions",subId), { status:"approved", points_awarded:points });
    tx.update(uRef, { points:(uSnap.data().points||0)+points });
  });
}

async function rejectSubmission(subId, reason) {
  await updateDoc(doc(db,"submissions",subId), { status:"rejected", reject_reason:reason||"" });
}

async function getRewards() {
  const snap = await getDocs(collection(db,"rewards"));
  return snap.docs.map(d => ({ id:d.id, ...d.data() }));
}

async function addReward(name, pts, stock) {
  return (await addDoc(collection(db,"rewards"), { name, points_required:+pts, stock:+stock })).id;
}

async function updateReward(id, data) {
  await updateDoc(doc(db,"rewards",id), { name:data.name, points_required:+data.points_required, stock:+data.stock });
}

async function deleteReward(id) { await deleteDoc(doc(db,"rewards",id)); }

async function redeemReward(userId, rewardId, rewardName, pointsRequired) {
  await runTransaction(db, async tx => {
    const uRef = doc(db,"users",userId);
    const rRef = doc(db,"rewards",rewardId);
    const [uSnap,rSnap] = await Promise.all([tx.get(uRef), tx.get(rRef)]);
    if ((uSnap.data().points||0) < pointsRequired) throw new Error("แต้มไม่เพียงพอ");
    if ((rSnap.data().stock||0) <= 0) throw new Error("ของรางวัลหมดแล้ว");
    tx.update(uRef, { points:(uSnap.data().points||0)-pointsRequired });
    tx.update(rRef, { stock:(rSnap.data().stock||0)-1 });
    tx.set(doc(collection(db,"redemptions")), {
      user_id:userId, reward_id:rewardId, reward_name:rewardName,
      status:"pending", created_at:serverTimestamp(),
    });
  });
}

async function getRedemptionsByUser(userId) {
  const snap = await getDocs(query(collection(db,"redemptions"), where("user_id","==",userId), orderBy("created_at","desc")));
  return snap.docs.map(d => ({ id:d.id, ...d.data(), created_at:d.data().created_at?.toMillis?.()??Date.now() }));
}

async function getAllRedemptions() {
  const snap = await getDocs(query(collection(db,"redemptions"), orderBy("created_at","desc")));
  return snap.docs.map(d => ({ id:d.id, ...d.data(), created_at:d.data().created_at?.toMillis?.()??Date.now() }));
}

async function approveRedemption(id) { await updateDoc(doc(db,"redemptions",id), { status:"approved" }); }

async function rejectRedemption(id, userId, rewardId, pts) {
  await runTransaction(db, async tx => {
    const uRef = doc(db,"users",userId);
    const rRef = doc(db,"rewards",rewardId);
    const [uSnap,rSnap] = await Promise.all([tx.get(uRef), tx.get(rRef)]);
    tx.update(uRef, { points:(uSnap.data().points||0)+pts });
    tx.update(rRef, { stock:(rSnap.data().stock||0)+1 });
    tx.update(doc(db,"redemptions",id), { status:"rejected" });
  });
}

async function getLeaderboard() {
  const snap = await getDocs(query(collection(db,"users"), where("role","==","student"), orderBy("points","desc")));
  return snap.docs.map(d => ({ id:d.id, ...d.data() }));
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser]   = useState(null);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    seedAdmin().finally(() => setReady(true));
    try { const u = JSON.parse(sessionStorage.getItem("ncs_u")); if(u) setUser(u); } catch(e){}
  }, []);

  const login  = u => { setUser(u); sessionStorage.setItem("ncs_u", JSON.stringify(u)); };
  const logout = ()=> { setUser(null); sessionStorage.removeItem("ncs_u"); };
  const setU   = u => { setUser(u); sessionStorage.setItem("ncs_u", JSON.stringify(u)); };

  if (!ready) return h("div",{style:S.authWrap}, h(Loading));
  if (!user)  return h(AuthScreen, {onLogin:login});
  if (user.role==="admin") return h(AdminApp, {user, setUser:setU, logout});
  return h(StudentApp, {user, setUser:setU, logout});
}

// ─── Auth ─────────────────────────────────────────────────────────────────────
function AuthScreen({onLogin}) {
  const [mode, setMode] = useState("login");
  const [form, setForm] = useState({name:"",student_id:"",password:""});
  const [err, setErr]   = useState("");
  const [busy, setBusy] = useState(false);
  const set = k => e => setForm({...form,[k]:e.target.value});

  const submit = async () => {
    setErr(""); setBusy(true);
    try {
      if (mode==="login") { onLogin(await loginUser(form.student_id, form.password)); }
      else {
        if (!form.name||!form.student_id||!form.password) throw new Error("กรุณากรอกข้อมูลให้ครบ");
        onLogin(await registerUser(form.name, form.student_id, form.password));
      }
    } catch(e) { setErr(e.message); }
    setBusy(false);
  };

  return h("div",{style:S.authWrap},
    h("div",{style:S.authCard},
      h("div",{style:{textAlign:"center",marginBottom:24}},
        h("div",{style:{display:"inline-flex",alignItems:"center",justifyContent:"center",width:60,height:60,borderRadius:"50%",background:"#1E3A8A",marginBottom:10,fontSize:28}},"🌿"),
        h("div",{style:{fontSize:24,fontWeight:800,color:"#1E3A8A"}},"NCS"),
        h("div",{style:{fontSize:13,color:"#64748B"}},"Nice Clean School"),
      ),
      h("div",{style:{display:"flex",background:"#F1F5F9",borderRadius:9,padding:3,marginBottom:20}},
        ["login","register"].map(m =>
          h("button",{key:m,onClick:()=>setMode(m),style:{flex:1,padding:"8px 0",border:"none",borderRadius:7,cursor:"pointer",fontWeight:mode===m?700:400,background:mode===m?"#fff":"transparent",color:"#1E3A8A",fontSize:14,fontFamily:"inherit",boxShadow:mode===m?"0 1px 4px rgba(0,0,0,.08)":"none"}},
            m==="login"?"เข้าสู่ระบบ":"สมัครสมาชิก")
        )
      ),
      mode==="register" && h("div",{style:{marginBottom:13}},
        h("label",{style:S.label},"ชื่อ-นามสกุล"),
        h("input",{style:S.input,placeholder:"ชื่อ-นามสกุล",value:form.name,onChange:set("name")}),
      ),
      h("div",{style:{marginBottom:13}},
        h("label",{style:S.label},"รหัสนักเรียน"),
        h("input",{style:S.input,placeholder:"รหัสนักเรียน",value:form.student_id,onChange:set("student_id")}),
      ),
      h("div",{style:{marginBottom:18}},
        h("label",{style:S.label},"รหัสผ่าน"),
        h("input",{style:S.input,type:"password",placeholder:"รหัสผ่าน",value:form.password,onChange:set("password"),onKeyDown:e=>e.key==="Enter"&&submit()}),
      ),
      err && h("div",{style:{color:"#DC2626",fontSize:13,marginBottom:13,background:"#FEE2E2",padding:"8px 12px",borderRadius:8}},err),
      h("button",{style:{...S.btn("primary"),width:"100%",justifyContent:"center",padding:"11px 0"},onClick:submit,disabled:busy},
        busy ? h(Spin) : mode==="login"?"เข้าสู่ระบบ":"สมัครสมาชิก"
      ),
    )
  );
}

// ─── Student ──────────────────────────────────────────────────────────────────
function StudentApp({user,setUser,logout}) {
  const [page,setPage] = useState("dashboard");
  const refresh = async () => { const u=await getUser(user.id); if(u) setUser(u); };
  const pages = [
    {id:"dashboard", label:"ภาพรวม",        icon:"📊"},
    {id:"submit",    label:"ส่งงานเก็บขยะ", icon:"📷"},
    {id:"history",   label:"ประวัติการส่ง",  icon:"📋"},
    {id:"rewards",   label:"แลกของรางวัล",   icon:"🎁"},
    {id:"board",     label:"อันดับ",          icon:"🏆"},
  ];
  return h("div",{style:S.app},
    h(Navbar,{user,logout}),
    h("div",{style:{display:"flex"}},
      h(Sidebar,{pages,active:page,onNav:setPage}),
      h("div",{style:{flex:1}},
        h("div",{style:S.main},
          page==="dashboard" && h(StudentDash,{user,onNav:setPage}),
          page==="submit"    && h(SubmitPage,{user,onDone:()=>{refresh();setPage("history");}}),
          page==="history"   && h(HistoryPage,{user}),
          page==="rewards"   && h(RewardsPage,{user,onRedeem:refresh}),
          page==="board"     && h(LeaderboardPage,null),
        )
      )
    )
  );
}

function StudentDash({user,onNav}) {
  const [subs,setSubs] = useState([]); const [loading,setLoading]=useState(true);
  useEffect(()=>{ getSubmissionsByUser(user.id).then(s=>{setSubs(s);setLoading(false);}); },[]);
  if(loading) return h(Loading);
  const approved=subs.filter(s=>s.status==="approved").length;
  const pending=subs.filter(s=>s.status==="pending").length;
  return h("div",null,
    h("div",{style:{fontSize:24,fontWeight:800,color:"#1E3A8A",marginBottom:3}},"สวัสดี, "+user.name+" 👋"),
    h("div",{style:{color:"#64748B",marginBottom:20,fontSize:13}},"รหัสนักเรียน: "+user.student_id),
    h("div",{style:S.statGrid},
      h("div",{style:S.stat("#EEF2FF")}, h("div",{style:S.statNum},user.points), h("div",{style:S.statLbl},"⭐ แต้มสะสม")),
      h("div",{style:S.stat("#DCFCE7")}, h("div",{style:S.statNum},approved), h("div",{style:S.statLbl},"✅ งานอนุมัติ")),
      h("div",{style:S.stat("#FEF3C7")}, h("div",{style:S.statNum},pending), h("div",{style:S.statLbl},"⏳ รออนุมัติ")),
      h("div",{style:S.stat("#FEE2E2")}, h("div",{style:S.statNum},subs.length), h("div",{style:S.statLbl},"📋 ส่งทั้งหมด")),
    ),
    h("div",{style:S.card},
      h("div",{style:{fontWeight:700,fontSize:15,marginBottom:14}},"งานล่าสุด"),
      subs.length===0
        ? h("div",{style:{color:"#94A3B8",textAlign:"center",padding:28}},"ยังไม่มีการส่งงาน")

    ),
    h("div",{style:S.card},
      rewards.length===0 ? h("div",{style:{color:"#94A3B8",textAlign:"center",padding:28}},"ยังไม่มีของรางวัล")
      : h("table",{style:S.table},
          h("thead",null,h("tr",null,["ชื่อ","แต้ม","คงเหลือ","จัดการ"].map(t=>h("th",{key:t,style:S.th},t)))),
          h("tbody",null,rewards.map(r=>h("tr",{key:r.id},
            h("td",{style:S.td},r.name),
            h("td",{style:S.td},h("span",{style:{color:"#DC2626",fontWeight:700}},r.points_required)),
            h("td",{style:S.td},r.stock),
            h("td",{style:S.td},h("div",{style:S.row},
              h("button",{style:S.btn("ghost"),onClick:()=>edit(r)},"แก้ไข"),
              h("button",{style:{...S.btn("danger"),padding:"6px 9px"},onClick:()=>del(r.id)},"🗑️"),
            )),
          )))
        )
    )
  );
}

function AdminRedemptions() {
  const [reds,setReds]=useState([]); const [loading,setLoading]=useState(true); const [busy,setBusy]=useState(null);
  const load=()=>getAllRedemptions().then(r=>{setReds(r);setLoading(false);});
  useEffect(()=>{ load(); },[]);
  const approve=async r=>{ setBusy(r.id); await approveRedemption(r.id); await load(); setBusy(null); };
  const reject=async r=>{ setBusy(r.id); const rList=await getRewards(); const rw=rList.find(x=>x.id===r.reward_id); await rejectRedemption(r.id,r.user_id,r.reward_id,rw?.points_required||0); await load(); setBusy(null); };
  if(loading) return h(Loading);
  const pending=reds.filter(r=>r.status==="pending");
  const done=reds.filter(r=>r.status!=="pending");
  return h("div",null,
    h("div",{style:S.h2},"🎁 อนุมัติการแลกของ"),
    h("div",{style:{fontWeight:700,color:"#D97706",marginBottom:10}},"รออนุมัติ ("+pending.length+")"),
    h("div",{style:S.card},
      pending.length===0 ? h("div",{style:{color:"#94A3B8",textAlign:"center",padding:28}},"ไม่มีรายการรออนุมัติ 🎉")
      : h("table",{style:S.table},
          h("thead",null,h("tr",null,["นักเรียน","ของรางวัล","วันที่","จัดการ"].map(t=>h("th",{key:t,style:S.th},t)))),
          h("tbody",null,pending.map(r=>h("tr",{key:r.id},
            h("td",{style:S.td},r.user_id),
            h("td",{style:S.td},r.reward_name),
            h("td",{style:S.td},new Date(r.created_at).toLocaleDateString("th-TH")),
            h("td",{style:S.td},h("div",{style:S.row},
              h("button",{style:S.btn("success"),onClick:()=>approve(r),disabled:busy===r.id},busy===r.id?h(Spin):"✅ มอบของ"),
              h("button",{style:S.btn("danger"),onClick:()=>reject(r),disabled:busy===r.id},busy===r.id?h(Spin):"❌ ยกเลิก"),
            )),
          )))
        )
    ),
    h("div",{style:{fontWeight:700,color:"#64748B",marginBottom:10}},"ประวัติ ("+done.length+")"),
    h("div",{style:S.card},
      done.length===0 ? h("div",{style:{color:"#94A3B8",textAlign:"center",padding:20}},"ไม่มีข้อมูล")
      : h("table",{style:S.table},
          h("thead",null,h("tr",null,["นักเรียน","ของรางวัล","สถานะ"].map(t=>h("th",{key:t,style:S.th},t)))),
          h("tbody",null,done.map(r=>h("tr",{key:r.id},
            h("td",{style:S.td},r.user_id),
            h("td",{style:S.td},r.reward_name),
            h("td",{style:S.td},h("span",{style:S.badge(r.status==="approved"?"approved":"rejected")},r.status==="approved"?"มอบแล้ว":"ยกเลิก")),
          )))
        )
    )
  );
}

// ─── Mount ────────────────────────────────────────────────────────────────────
createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
